services:
  editor:
    build: .
    container_name: subway-polygon-editor
    ports:
      - "${EDITOR_PORT:-5050}:5050"
    volumes:
      - "${EDITOR_IMAGE_ROOT:-.}:/data/images:ro"
      - "${EDITOR_OUTPUT_ROOT:-../test_image_output/web_projects}:/data/projects"
      - "./config:/app/config"
    command:
      - python
      - editor/app.py
      - --image
      - "${EDITOR_IMAGE:-/data/images/test1.png}"
      - --polygons
      - "${EDITOR_POLYGONS:-/data/projects/test1/intermediate_polygons.json}"
      - --output
      - "${EDITOR_ANNOTATIONS:-/data/projects/test1/manual_annotations.json}"
      - --final-output
      - "${EDITOR_FINAL_OUTPUT:-/data/projects/test1/final_polygons.json}"
      - --plane-output
      - "${EDITOR_PLANE_OUTPUT:-/data/projects/test1/scene_planes.json}"
      - --marker-config
      - "${EDITOR_MARKER_CONFIG:-/data/projects/test1/marker_config.json}"
      - --image-root
      - /data/images
      - --project-output-root
      - /data/projects
      - --allow-missing-image
      - --host
      - 0.0.0.0
      - --port
      - "5050"
      - --invert-x
